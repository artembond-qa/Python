name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libgtk-3-0t64

      - name: Install Chrome and Chromedriver
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest selenium

      - name: Run tests
        run: xvfb-run -a pytest -v --tb=short
        env:
          GITHUB_ACTIONS: true
