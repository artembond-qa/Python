name: Run autotest

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Select tests to run'
        required: true
        type: choice
        default: 'all'
        options:
          - all

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Selenium Autotests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome 146 + matching Chromedriver
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 146
          install-chromedriver: true
          install-dependencies: true

      - name: Remove conflicting chromedriver from PATH (important!)
        run: |
          sudo rm -f /opt/hostedtoolcache/setup-chrome/chromedriver/stable/x64/chromedriver || true

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest selenium

      - name: Run tests
        run: pytest -v --tb=short
        env:
          GITHUB_ACTIONS: true
